
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Sandbox Enterprise</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0c10">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}

<style>
    :root {
        --safe: #4ade80;
        --suspicious: #fbbf24;
        --malicious: #f87171;
    }
    body {
        font-family: 'Roboto', sans-serif;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        overflow-x: hidden;
        background-color: #0a0c10;
    }
    .font-serif { font-family: 'Lora', serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .m3-card {
        border-radius: 32px;
        background: #1c1b1f;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .m3-card:active {
        transform: scale(0.97);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    @media print {
        @page {
            size: A4;
            margin: 20mm;
        }
        body { 
            background: white !important; 
            color: black !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        .no-print { 
            display: none !important; 
        }
        .print-only {
            display: block !important;
        }
        #root {
            background: white !important;
        }
        .report-container {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: auto !important;
            overflow: visible !important;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
        }
        /* Fix colors for printing */
        .bg-slate-900 { background-color: #0f172a !important; color: white !important; -webkit-print-color-adjust: exact; }
        .bg-slate-50 { background-color: #f8fafc !important; border: 1px solid #e2e8f0 !important; }
        .border-slate-900 { border-color: #0f172a !important; }
        .text-slate-400 { color: #94a3b8 !important; }
        .text-red-600 { color: #dc2626 !important; font-weight: bold !important; }
    }
</style>
</head>
<body class="bg-[#0a0c10] text-[#e6e1e5] antialiased">
    <div id="root"></div>
</body>
</html>
